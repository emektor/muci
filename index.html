<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muci's Care Interface</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 28px;}
        h2 { color: #34495e; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; margin-top: 30px;}
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        
        button { padding: 10px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; background-color: #3498db; color: white; cursor: pointer; display: flex; align-items: center; justify-content: flex-start; gap: 8px; }
        button:hover { background-color: #2980b9; }
        
        .cmd-name { padding: 5px; border: 1px dashed transparent; border-radius: 4px; width: 100%; text-align: left; outline: none; }
        .cmd-name:focus { border-color: white; background: rgba(255,255,255,0.2); }
        
        .schedule-section { text-align: center; }
        .schedule-section img { max-width: 100%; border-radius: 8px; border: 2px solid #ddd; margin-top: 10px; }
        .schedule-card { margin-top: 24px; }
        .schedule-card h3 { color: #34495e; margin-bottom: 5px; }
        
        .notes-section { background: #fffbcc; padding: 20px; border-radius: 8px; border-left: 5px solid #f1c40f; margin-top: 30px; }
        .notes-textarea { width: 100%; height: 120px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit; font-size: 15px; resize: vertical; box-sizing: border-box; margin-top: 10px;}
    </style>
</head>
<body>
    <div class="container">
        <h1>🐾 Muci's Commands & Schedule</h1>

        <h2>🔊 Voice Commands <span style="font-size: 12px; font-weight: normal; color: #7f8c8d;">(Click text to edit names)</span></h2>
        <div class="grid">
            <button><span onclick="playSound('command1.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd1', this)" id="cmd1">AL - TAKE</span></button>
            <button><span onclick="playSound('command2.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd2', this)" id="cmd2">KALK - STAND UP</span></button>
            <button><span onclick="playSound('command3.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd3', this)" id="cmd3">GEL - COME</span></button>
            <button><span onclick="playSound('command4.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd4', this)" id="cmd4">HOP - JUMP</span></button>
            
            <button><span onclick="playSound('command5.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd5', this)" id="cmd5">TOUCH</span></button>
            <button><span onclick="playSound('command6.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd6', this)" id="cmd6">İN - GO DOWN</span></button>
            <button><span onclick="playSound('command7.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd7', this)" id="cmd7">YEMEK - FOOD</span></button>
            <button><span onclick="playSound('command8.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd8', this)" id="cmd8">YAT - LAY</span></button>
            
            <button><span onclick="playSound('command9.mp3?v=2')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd9', this)" id="cmd9">YATAK - GO BACK TO YOUR BED</span></button>
            <button><span onclick="playSound('command10.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd10', this)" id="cmd10">HAYIR - NO</span></button>
            <button><span onclick="playSound('command11.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd11', this)" id="cmd11">ÇIK - GO OUT</span></button>
            <button><span onclick="playSound('command 12.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd12', this)" id="cmd12">TOUCH</span></button>

            <button><span onclick="playSound('command13.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd13', this)" id="cmd13">BEKLE - WAIT</span></button>
        </div>

        <div class="schedule-section">
            <h2>📅 Schedules</h2>

            <div class="schedule-card">
                <h3>🍽️ Food Schedule</h3>
                <img src="food-schedule.png" alt="Muci's Food Schedule">
            </div>

            <div class="schedule-card">
                <h3>📅 Daily Schedule</h3>
                <img src="daily-schedule.png" alt="Muci's Daily Schedule">
            </div>
        </div>

        <div class="notes-section">
            <h2>📝 Important Notes</h2>
            <p style="margin-top: 0;">Leave any specific instructions about food, walks, or vet contacts below:</p>
            <textarea class="notes-textarea" id="muciNotes" onblur="saveNotes()" placeholder="Type notes here...">IMPORTANT: No going outside for 45 minutes after eating.

YEMEK - FOOD command is for her to start eating after you prepared her food. She has to/she waits for the command.
You can every time support your command with a snap after 1-2 seconds if she hasn't reacted already.
Commands like sit wait and lay: You have seen my hand
- wait is like stop sign - - - sit is like point finger up the rest down - - - lay is like your palm looks to the ground and goes down a bit with your command.
Touch is for gaming indeed as you have seen but it works better than her name sometimes to gain her attention back.
Kalk is to make her move - - - when she is laying, different than come she has to just stand up... :)</textarea>
        </div>
    </div>

    <script>
        window.onload = function() {
            // Migrate the old saved cmd9 label so YATAK does not disappear after load.
            const commandNameVersion = '2026-07-23-yatak-v1';
            if (localStorage.getItem('muciCommandNameVersion') !== commandNameVersion) {
                localStorage.setItem('cmd9', 'YATAK - GO BACK TO YOUR BED');
                localStorage.setItem('muciCommandNameVersion', commandNameVersion);
            }

            for(let i=1; i<=13; i++) {
                let savedName = localStorage.getItem('cmd' + i);
                if(savedName) document.getElementById('cmd' + i).innerText = savedName;
            }
            const foodSafetyNotice = 'IMPORTANT: No going outside for 45 minutes after eating.';
            const notesVersion = '2026-07-23-food-safety-v1';
            let savedNotes = localStorage.getItem('muciNotes');

            // Add the new safety notice once while preserving any notes already saved.
            if (localStorage.getItem('muciNotesVersion') !== notesVersion) {
                const currentNotes = savedNotes || document.getElementById('muciNotes').value;
                if (!currentNotes.startsWith(foodSafetyNotice)) {
                    savedNotes = foodSafetyNotice + '\n\n' + currentNotes;
                    localStorage.setItem('muciNotes', savedNotes);
                }
                localStorage.setItem('muciNotesVersion', notesVersion);
            }

            if(savedNotes) document.getElementById('muciNotes').value = savedNotes;
        }

        function saveName(id, element) {
            localStorage.setItem(id, element.innerText);
        }
        function saveNotes() {
            let notes = document.getElementById('muciNotes').value;
            localStorage.setItem('muciNotes', notes);
        }

        let audioQueue = [];
        let isPlaying = false;

        function playSound(audioFile) {
            audioQueue.push(audioFile); 
            playNext(); 
        }

        function playNext() {
            if (isPlaying || audioQueue.length === 0) return; 
            
            isPlaying = true;
            let currentAudio = audioQueue.shift(); 
            let audio = new Audio(currentAudio);
            
            audio.onended = function() {
                isPlaying = false; 
                playNext(); 
            };
            
            audio.play().catch(error => {
                alert("Audio file not found! Please make sure '" + currentAudio + "' is uploaded.");
                isPlaying = false;
                playNext(); 
            });
        }
    </script>
</body>
</html>
