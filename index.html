<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muci's Care Interface</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; font-size: 28px;}
        h2 { color: #34495e; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; margin-top: 30px;}
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        
        button { padding: 10px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; background-color: #3498db; color: white; cursor: pointer; display: flex; align-items: center; justify-content: flex-start; gap: 8px; }
        button:hover { background-color: #2980b9; }
        
        .cmd-name { padding: 5px; border: 1px dashed transparent; border-radius: 4px; width: 100%; text-align: left; outline: none; }
        .cmd-name:focus { border-color: white; background: rgba(255,255,255,0.2); }
        
        .schedule-section { text-align: center; }
        .schedule-section img { max-width: 100%; border-radius: 8px; border: 2px solid #ddd; margin-top: 10px; }
        
        .notes-section { background: #fffbcc; padding: 20px; border-radius: 8px; border-left: 5px solid #f1c40f; margin-top: 30px; }
        .notes-textarea { width: 100%; height: 120px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit; font-size: 15px; resize: vertical; box-sizing: border-box; margin-top: 10px;}
    </style>
</head>
<body>
    <div class="container">
        <h1>🐾 Muci's Commands & Schedule</h1>

        <h2>🔊 Voice Commands <span style="font-size: 12px; font-weight: normal; color: #7f8c8d;">(Click text to edit names)</span></h2>
        <div class="grid">
            <button><span onclick="playSound('command1.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd1', this)" id="cmd1">HAYIR - NO</span></button>
            <button><span onclick="playSound('command2.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd2', this)" id="cmd2">BEKLE - WAIT</span></button>
            <button><span onclick="playSound('command3.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd3', this)" id="cmd3">YAT - LAY</span></button>
            <button><span onclick="playSound('command4.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd4', this)" id="cmd4">GEL - COME</span></button>
            <button><span onclick="playSound('command5.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd5', this)" id="cmd5">OTUR - SIT</span></button>
            <button><span onclick="playSound('command6.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd6', this)" id="cmd6">YEMEK - FOOD</span></button>
            <button><span onclick="playSound('command7.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd7', this)" id="cmd7">AL - TAKE</span></button>
            <button><span onclick="playSound('command8.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd8', this)" id="cmd8">HOP - JUMP</span></button>
            <button><span onclick="playSound('command9.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd9', this)" id="cmd9">İN - GO DOWN</span></button>
            <button><span onclick="playSound('command10.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd10', this)" id="cmd10">ÇIK - GO OUT</span></button>
            <button><span onclick="playSound('command11.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd11', this)" id="cmd11">Command 11</span></button>
            <button><span onclick="playSound('command12.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd12', this)" id="cmd12">Command 12</span></button>
            <button><span onclick="playSound('command13.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd13', this)" id="cmd13">Command 13</span></button>
            <button><span onclick="playSound('command14.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd14', this)" id="cmd14">Command 14</span></button>
            <button><span onclick="playSound('command15.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd15', this)" id="cmd15">Command 15</span></button>
            <button><span onclick="playSound('command16.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd16', this)" id="cmd16">Command 16</span></button>
            <button><span onclick="playSound('command17.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd17', this)" id="cmd17">Command 17</span></button>
            <button><span onclick="playSound('command18.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd18', this)" id="cmd18">Command 18</span></button>
            <button><span onclick="playSound('command19.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd19', this)" id="cmd19">RIGHT</span></button>
            <button><span onclick="playSound('command20.mp3')">▶</span> <span class="cmd-name" contenteditable="true" onblur="saveName('cmd20', this)" id="cmd20">LEFT</span></button>
        </div>

        <div class="schedule-section">
            <h2>📅 Daily Schedule</h2>
            <!-- **[GÜNCELLEME] İki fotoğrafın da hata vermeden alt alta görünebilmesi için alan genişletildi** -->
            <img src="schedule.jpg" alt="Daily Schedule 1" onerror="this.onerror=null; this.src='https://via.placeholder.com/800x400?text=Please+add+schedule.jpg+to+the+folder'">
            <img src="schedule2.jpg" alt="Daily Schedule 2" style="margin-top: 15px;" onerror="this.style.display='none'">
        </div>

        <div class="notes-section">
            <h2>📝 Important Notes</h2>
            <p style="margin-top: 0;">Leave any specific instructions about food, walks, or vet contacts below:</p>
            <textarea class="notes-textarea" id="muciNotes" onblur="saveNotes()" placeholder="Type notes here...">YEMEK - FOOD command is for her to start eating after you prepared her food. She has to/she waits for the command.</textarea>
        </div>
    </div>

    <script>
        window.onload = function() {
            for(let i=1; i<=20; i++) {
                let savedName = localStorage.getItem('cmd' + i);
                if(savedName) document.getElementById('cmd' + i).innerText = savedName;
            }
            let savedNotes = localStorage.getItem('muciNotes');
            if(savedNotes) document.getElementById('muciNotes').value = savedNotes;
        }

        function saveName(id, element) {
            localStorage.setItem(id, element.innerText);
        }
        function saveNotes() {
            let notes = document.getElementById('muciNotes').value;
            localStorage.setItem('muciNotes', notes);
        }

        let audioQueue = [];
        let isPlaying = false;

        function playSound(audioFile) {
            audioQueue.push(audioFile); 
            playNext(); 
        }

        function playNext() {
            if (isPlaying || audioQueue.length === 0) return; 
            
            isPlaying = true;
            let currentAudio = audioQueue.shift(); 
            let audio = new Audio(currentAudio);
            
            audio.onended = function() {
                isPlaying = false; 
                playNext(); 
            };
            
            audio.play().catch(error => {
                alert("Audio file not found! Please make sure '" + currentAudio + "' is uploaded.");
                isPlaying = false;
                playNext(); 
            });
        }
    </script>
</body>
</html>
